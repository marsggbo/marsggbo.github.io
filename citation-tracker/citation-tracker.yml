name: Citation Tracker

on:
  schedule:
    # 每天早上10点（北京时间）自动运行
    - cron: '0 2 * * *'  # UTC 2:00 = 北京时间 10:00
  workflow_dispatch:  # 支持手动触发

jobs:
  update-citations:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml
          
      - name: Scrape Google Scholar
        run: python scrape_scholar.py
        env:
          SCHOLAR_USER_ID: ${{ secrets.SCHOLAR_USER_ID }}
          
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          
          # 检查是否有变化
          if git diff --stat | grep -q "citation_data.json"; then
            git add citation_data.json index.html
            git commit -m "📊 Update citations - $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ Citations updated and pushed"
          else
            echo "📝 No citation changes detected, skipping commit"
          fi
